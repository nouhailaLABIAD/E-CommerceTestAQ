<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Lalla Délices</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --cream: #F8F3EE;
            --cream-deep: #F0E8DF;
            --warm-white: #FDFAF7;
            --sand: #ffeed9;
            --sand-dark: #D4BFA8;
            --taupe: #B8A090;
            --mocha: #8C6E5A;
            --espresso: #5C4033;
            --gold: #C9A96E;
            --gold-light: #f8d99a;
            --gold-pale: #F5EDDC;
            --sage: #A8B89C;
            --sage-deep: #849A76;
            --ink: #3A3028;
            --ink-soft: #6B5C52;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--ink);
        }

        /* FOND */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(168, 184, 156, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(201, 169, 110, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .register-container {
            background: var(--warm-white);
            border: 1px solid var(--sand);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(92, 64, 51, 0.15);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        h2 {
            text-align: center;
            font-family: 'Playfair Display', serif;
            color: var(--espresso);
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--espresso);
            text-decoration: none;
            display: block;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .brand em { color: var(--gold); font-style: italic; }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            color: var(--espresso);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            padding: 14px 16px;
            margin-bottom: 20px;
            border: 1px solid var(--sand-dark);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            width: 100%;
            background: var(--cream);
            color: var(--ink);
        }

        input::placeholder {
            color: var(--taupe);
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.2);
            background: var(--warm-white);
        }

        button {
            background: var(--espresso);
            color: var(--cream);
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            margin-top: 10px;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(92, 64, 51, 0.35);
            background: var(--gold);
            color: var(--espresso);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #c2185b;
            font-size: 14px;
            margin-top: -15px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            color: var(--taupe);
            font-size: 14px;
        }

        .login-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-link a:hover {
            color: var(--espresso);
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 25px;
            }

            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <a class="brand" href="/">Lalla <em>Délices</em></a>
        <h2>Créer un compte</h2>
        <form th:action="@{/register}" th:object="${user}" method="post">
            <label for="nom">Nom</label>
            <input type="text" id="nom" th:field="*{nom}" placeholder="Votre nom" required/>

            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" placeholder="exemple@email.com" required/>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" th:field="*{password}" placeholder="Votre mot de passe" required/>

            <button type="submit">S'inscrire</button>
        </form>
        <div class="login-link">
            Déjà un compte ? <a href="/login">Connectez-vous</a>
        </div>
    </div>
</body>
</html>
