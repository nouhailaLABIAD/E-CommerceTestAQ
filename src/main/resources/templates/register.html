<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inscription - Lalla Délices</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/lalla-delices.css}"/>
</head>
<body class="auth-page">

    <a class="brand auth-brand" href="/">Lalla <em>Délices</em></a>

    <div class="auth-card wide">
        <div class="card-header">
            <div class="icon">✨</div>
            <h2>Créer un compte</h2>
            <p>Rejoignez la communauté Lalla Délices</p>
        </div>

        <div class="alert alert-error" th:if="${errorEmail}">
            <span>⚠️</span><span th:text="${errorEmail}">Erreur</span>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post"
              style="display:flex;flex-direction:column;gap:1.2rem;">
            <div class="form-group">
                <label for="nom">Nom</label>
                <input type="text" id="nom" th:field="*{nom}" placeholder="Votre nom" required/>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" placeholder="exemple@email.com" required/>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" th:field="*{password}" placeholder="Votre mot de passe" required/>
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:.4rem;">
                S'inscrire →
            </button>
        </form>

        <div class="auth-footer" style="margin-top:1.5rem;">
            Déjà un compte ? <a href="/login">Connectez-vous</a>
        </div>
    </div>

    <a class="back-link" href="/">← Retour à l'accueil</a>

</body>
</html>
