<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Boutique - Lalla Délices</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/lalla-delices.css}"/>
</head>
<body>

<nav class="client-nav">
    <a class="brand" href="/">Lalla <em>Délices</em></a>
    <div class="nav-links">
        <a href="/">Accueil</a>
        <a href="/client/products">Boutique</a>
        <a href="/cart" class="cart-badge">🛒 <span th:text="${cartItemCount != null ? cartItemCount : 0}">0</span></a>
    </div>
</nav>

<div class="hero">
    <h1>Notre Boutique</h1>
    <p>Pâtisseries artisanales préparées avec amour</p>
    <form th:action="@{/client/products/search}" method="get">
        <div class="search-bar">
            <input type="text" name="keyword" th:value="${searchKeyword}" placeholder="🔍 Rechercher un produit..."/>
            <button type="submit">Rechercher</button>
        </div>
    </form>
</div>

<div class="shop-layout">

    <!-- Filtres catégories -->
    <aside class="filters-sidebar">
        <h3>Catégories</h3>
        <div class="category-filter">
            <a href="/client/products" class="filter-btn" th:classappend="${selectedCategory == null ? ' active' : ''}">
                <div class="filter-thumb">🏠</div>
                Tout voir
            </a>
            <a th:each="cat : ${categories}"
               th:href="@{/client/products(categoryId=${cat.id})}"
               class="filter-btn"
               th:classappend="${selectedCategory != null and selectedCategory == cat.id ? ' active' : ''}">
                <div class="filter-thumb">
                    <img th:if="${cat.imageUrl != null and !cat.imageUrl.isEmpty()}" th:src="${cat.imageUrl}" th:alt="${cat.nom}"/>
                    <span th:if="${cat.imageUrl == null or cat.imageUrl.isEmpty()}">🏷</span>
                </div>
                <span th:text="${cat.nom}">Catégorie</span>
            </a>
        </div>
    </aside>

    <!-- Produits -->
    <section class="products-section">
        <div class="section-top">
            <h2 th:text="${searchKeyword != null ? 'Résultats pour &quot;' + searchKeyword + '&quot;' : 'Tous les produits'}">Tous les produits</h2>
            <span class="count-badge" th:text="${products.size()} + ' produit(s)'">0 produit(s)</span>
        </div>

        <div class="products-grid" th:if="${!products.isEmpty()}">
            <div class="product-card" th:each="p : ${products}">
                <div class="card-image">
                    <img th:if="${p.imageUrl != null and !p.imageUrl.isEmpty()}" th:src="${p.imageUrl}" th:alt="${p.nom}"/>
                    <span th:if="${p.imageUrl == null or p.imageUrl.isEmpty()}">🛍</span>
                </div>
                <div class="card-body">
                    <div class="card-category" th:text="${p.category != null ? p.category.nom : ''}"></div>
                    <a th:href="@{/client/products/{id}(id=${p.id})}" style="text-decoration:none;color:inherit;">
                        <h3 th:text="${p.nom}">Nom produit</h3>
                    </a>
                    <div class="card-price"><span th:text="${p.prix}">0.00</span><span> €</span></div>
                    <div class="card-footer">
                        <a class="voir-detail" th:href="@{/client/products/{id}(id=${p.id})}">Voir le détail →</a>
                        <button class="btn btn-primary btn-sm"
                                th:onclick="|window.location.href='@{/cart/add/{id}(id=${p.id})}'|">🛒 Ajouter</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="empty-state" th:if="${products.isEmpty()}">
            <div class="empty-icon">🔍</div>
            <p>Aucun produit trouvé.<br/>
               <a href="/client/products" style="color:var(--gold);text-decoration:none;font-weight:600">Voir tous les produits →</a>
            </p>
        </div>
    </section>
</div>
</body>
</html>
