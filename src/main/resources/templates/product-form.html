<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Form Produit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 240px;
            background: rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.07);
            padding: 2rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: .4rem;
            flex-shrink: 0;
        }
        .sidebar .brand {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;    
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            padding-left: .5rem;
            text-decoration: none;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: .7rem;
            padding: .65rem .9rem;
            border-radius: 10px;
            color: #64748b;
            text-decoration: none;
            font-size: .9rem;
            transition: background .2s, color .2s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(129,140,248,0.1);
            color: #818cf8;
        }

        /* ── MAIN ── */
        .main {
            flex: 1;
            padding: 2.5rem 3rem;
            overflow-y: auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .back-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            color: #64748b;
            text-decoration: none;
            font-size: 1rem;
            transition: all .2s;
        }
        .back-btn:hover { background: rgba(129,140,248,0.1); color: #818cf8; }
        .page-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #e2e8f0;
        }

        /* ── FORM CARD ── */
        .form-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 2.2rem 2.5rem;
            max-width: 680px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.4rem;
        }
        .form-group { display: flex; flex-direction: column; gap: .5rem; }
        .form-group.full { grid-column: 1 / -1; }

        label {
            font-size: .82rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        input, select, textarea {
            padding: .75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: rgba(129,140,248,0.6);
            box-shadow: 0 0 0 3px rgba(129,140,248,0.1);
        }
        select option { background: #1e1e2e; }
        input::placeholder, textarea::placeholder { color: #475569; }

        .error-msg {
            font-size: .78rem;
            color: #f87171;
            display: flex;
            align-items: center;
            gap: .3rem;
            margin-top: .2rem;
        }
        .error-msg::before { content: '⚠'; }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 1.6rem 0;
            grid-column: 1 / -1;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .btn-primary {
            flex: 1;
            padding: .85rem 1.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
        }
        .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
        .btn-secondary {
            padding: .85rem 1.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #94a3b8;
            font-family: inherit;
            font-size: .95rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: background .2s;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.09); color: #e2e8f0; }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <a class="brand" href="/admin">✦ ShopLux</a>
    <a href="/admin">🏠 Dashboard</a>
    <a href="/admin/products" class="active">📦 Produits</a>
    <a href="/admin/categories">🏷 Catégories</a>
    <a href="/admin/orders">📋 Commandes</a>
    <a href="/logout" style="margin-top:auto; color:#f87171;">🚪 Déconnexion</a>
</aside>

<!-- MAIN -->
<main class="main">
    <div class="page-header">
        <a href="/admin/products" class="back-btn">←</a>
        <h2>Formulaire Produit</h2>
    </div>

    <div class="form-card">
        <form th:action="@{/admin/products}"
              th:object="${product}"
              method="post">

            <div class="form-grid">

                <!-- NOM -->
                <div class="form-group full">
                    <label for="nom">Nom du produit</label>
                    <input type="text" id="nom" th:field="*{nom}" placeholder="Ex : MacBook Pro 16''"/>
                    <div class="error-msg"
                         th:if="${#fields.hasErrors('nom')}"
                         th:errors="*{nom}"></div>
                </div>

                <!-- DESCRIPTION -->
                <div class="form-group full">
                    <label for="description">Description</label>
                    <input type="text" id="description" th:field="*{description}"
                           placeholder="Courte description du produit…"/>
                    <div class="error-msg"
                         th:if="${#fields.hasErrors('description')}"
                         th:errors="*{description}"></div>
                </div>

                <div class="divider"></div>

                <!-- PRIX -->
                <div class="form-group">
                    <label for="prix">Prix (€)</label>
                    <input type="number" id="prix" step="0.01"
                           th:field="*{prix}" placeholder="0.00"/>
                    <div class="error-msg"
                         th:if="${#fields.hasErrors('prix')}"
                         th:errors="*{prix}"></div>
                </div>

                <!-- STOCK -->
                <div class="form-group">
                    <label for="stock">Stock</label>
                    <input type="number" id="stock"
                           th:field="*{stock}" placeholder="0"/>
                    <div class="error-msg"
                         th:if="${#fields.hasErrors('stock')}"
                         th:errors="*{stock}"></div>
                </div>

                <!-- CATEGORIE -->
                <div class="form-group full">
                    <label for="category">Catégorie</label>
                    <select id="category" th:field="*{category.id}">
                        <option value="">— Choisir une catégorie —</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.nom}"></option>
                    </select>
                    <div class="error-msg"
                         th:if="${#fields.hasErrors('category')}"
                         th:errors="*{category}"></div>
                </div>

            </div><!-- /grid -->

            <div class="form-actions">
                <a href="/admin/products" class="btn-secondary">Annuler</a>
                <button type="submit" class="btn-primary">💾 Enregistrer le produit</button>
            </div>

        </form>
    </div>
</main>

</body>
</html>
