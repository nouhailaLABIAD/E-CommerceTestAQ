<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Form Produit - Lalla Délices</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/lalla-delices.css}"/>
</head>
<body class="admin-layout">

<aside class="sidebar">
    <a class="brand" href="/admin">Lalla <em>Délices</em></a>
    <a href="/admin/homeAdmin">🏠 Dashboard</a>
    <a href="/admin/products" class="active">📦 Produits</a>
    <a href="/admin/categories">🏷 Catégories</a>
    <a href="/admin/orders">📋 Commandes</a>
    <div class="logout"><a href="/logout">🚪 Déconnexion</a></div>
</aside>

<main class="admin-main">
    <div class="page-header">
        <a href="/admin/products" class="back-btn">←</a>
        <h2 th:text="${product.id != null ? 'Modifier le produit' : 'Nouveau produit'}">Formulaire</h2>
    </div>

    <div class="form-card">
        <form th:action="${product.id != null ? '/admin/products/edit/' + product.id : '/admin/products'}"
              method="post" enctype="multipart/form-data">

            <input type="hidden" name="existingImageUrl" th:value="${product.imageUrl}"/>

            <div class="form-grid">

                <div class="form-group full">
                    <label for="nom">Nom du produit</label>
                    <input type="text" id="nom" name="nom" th:value="${product.nom}" placeholder="Ex : Croissant Beurre" required/>
                </div>

                <div class="form-group full">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" th:value="${product.description}" placeholder="Courte description..." required/>
                </div>

                <div class="form-divider"></div>

                <div class="form-group">
                    <label for="prix">Prix (€)</label>
                    <input type="number" id="prix" name="prix" step="0.01" min="0.01" th:value="${product.prix}" placeholder="0.00" required/>
                </div>

                <div class="form-group">
                    <label for="stock">Stock</label>
                    <input type="number" id="stock" name="stock" min="0" th:value="${product.stock}" placeholder="0" required/>
                </div>

                <div class="form-group full">
                    <label for="categoryId">Catégorie</label>
                    <select id="categoryId" name="categoryId" required>
                        <option value="">— Choisir une catégorie —</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.nom}"
                                th:selected="${product.category != null and product.category.id == c.id}">
                        </option>
                    </select>
                </div>

                <div class="form-divider"></div>

                <div class="form-group full">
                    <label>Image du produit</label>
                    <div class="existing-image" th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}">
                        <p>Image actuelle :</p>
                        <img th:src="${product.imageUrl}" alt="Image actuelle"/>
                    </div>
                    <div class="image-upload-zone">
                        <input type="file" name="imageFile" accept="image/jpeg,image/png,image/webp" onchange="previewImage(this)"/>
                        <div class="upload-icon">📷</div>
                        <div class="upload-text">
                            <strong>Cliquez pour choisir une image</strong><br/>
                            <span th:text="${product.imageUrl != null ? 'ou glissez une image pour remplacer' : 'ou glissez votre fichier ici'}">ou glissez votre fichier ici</span><br/>
                            <small style="color:var(--taupe);font-size:.75rem">JPG, PNG, WebP — max 5 Mo</small>
                        </div>
                    </div>
                    <div class="image-preview-wrap" id="previewWrap">
                        <p class="preview-label">Nouvelle image :</p>
                        <img id="previewImg" src="#" alt="Prévisualisation"/>
                    </div>
                </div>

            </div>

            <div class="form-actions">
                <a href="/admin/products" class="btn btn-secondary">Annuler</a>
                <button type="submit" class="btn btn-primary" style="flex:1;">💾 Enregistrer</button>
            </div>
        </form>
    </div>
</main>

<script>
    function previewImage(input) {
        const wrap = document.getElementById('previewWrap');
        const img  = document.getElementById('previewImg');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { img.src = e.target.result; wrap.classList.add('visible'); };
            reader.readAsDataURL(input.files[0]);
        } else { wrap.classList.remove('visible'); }
    }
</script>
</body>
</html>
