<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${product.nom} + ' - Lalla Délices'">Produit</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/lalla-delices.css}"/>
</head>
<body>

<nav class="client-nav">
    <a class="brand" href="/">Lalla <em>Délices</em></a>
    <div class="nav-links">
        <a href="/client/products">Boutique</a>
        <a href="/cart" class="cart-badge">🛒 Panier</a>
    </div>
</nav>

<div class="container-md" style="margin-top:3.5rem; margin-bottom:4rem;">

    <div class="breadcrumb">
        <a href="/">Accueil</a> <span>/</span>
        <a href="/client/products">Boutique</a> <span>/</span>
        <span th:text="${product.nom}">Produit</span>
    </div>

    <div class="product-detail-card">

        <!-- Image -->
        <div class="product-visual">
            <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                 th:src="${product.imageUrl}" th:alt="${product.nom}"/>
            <div th:if="${product.imageUrl == null or product.imageUrl.isEmpty()}">
                <div class="placeholder-icon">🛍</div>
                <span class="placeholder-hint">Image du produit</span>
            </div>
        </div>

        <!-- Infos -->
        <div class="product-info">

            <div class="category-badge" th:if="${product.category != null}">
                <div class="cat-img">
                    <img th:if="${product.category.imageUrl != null and !product.category.imageUrl.isEmpty()}"
                         th:src="${product.category.imageUrl}" th:alt="${product.category.nom}"/>
                    <span th:if="${product.category.imageUrl == null or product.category.imageUrl.isEmpty()}">🏷</span>
                </div>
                <span th:text="${product.category.nom}">Catégorie</span>
            </div>

            <h1 style="font-size:2rem;" th:text="${product.nom}">Nom du produit</h1>
            <p style="color:var(--taupe);font-size:.95rem;line-height:1.6;" th:text="${product.description}">Description...</p>

            <div class="hr"></div>

            <div class="price-block">
                <span class="price-main" th:text="${product.prix}">0.00</span>
                <span class="price-unit">€ TTC</span>
            </div>

            <div class="stock-info">
                <div class="stock-dot" th:classappend="${product.stock > 5 ? '' : (product.stock > 0 ? 'low' : 'out')}"></div>
                En stock : <strong style="color:var(--espresso)" th:text="${product.stock}">0</strong> unité(s)
            </div>

            <div class="hr"></div>

            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                <button type="submit" class="btn btn-primary btn-full"
                        th:disabled="${product.stock == 0}"
                        th:text="${product.stock > 0 ? '🛒 Ajouter au panier' : '⚠️ Rupture de stock'}">
                    🛒 Ajouter au panier
                </button>
            </form>
            <a href="/client/products" class="btn btn-secondary btn-full" style="margin-top:.6rem;">← Retour à la boutique</a>
        </div>
    </div>

    <!-- Produits similaires -->
    <div class="similar-section" th:if="${similarProducts != null and !similarProducts.isEmpty()}">
        <h2>Vous pourriez aussi aimer</h2>
        <div class="similar-grid">
            <a class="similar-card" th:each="sp : ${similarProducts}" th:href="@{/client/products/{id}(id=${sp.id})}">
                <div class="sim-img">
                    <img th:if="${sp.imageUrl != null and !sp.imageUrl.isEmpty()}" th:src="${sp.imageUrl}" th:alt="${sp.nom}"/>
                    <span th:if="${sp.imageUrl == null or sp.imageUrl.isEmpty()}">🛍</span>
                </div>
                <div class="sim-body">
                    <h4 th:text="${sp.nom}">Produit</h4>
                    <div class="sim-price"><span th:text="${sp.prix}">0.00</span> €</div>
                </div>
            </a>
        </div>
    </div>

</div>
</body>
</html>
