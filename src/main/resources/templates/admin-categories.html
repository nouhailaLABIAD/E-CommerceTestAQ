<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Catégories - Lalla Délices Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/lalla-delices.css}"/>
</head>
<body class="admin-layout">

<aside class="sidebar">
    <a class="brand" href="/admin/homeAdmin">Lalla <em>Délices</em></a>
    <a href="/admin/homeAdmin">🏠 Dashboard</a>
    <a href="/admin/products">📦 Produits</a>
    <a href="/admin/categories" class="active">🏷 Catégories</a>
    <a href="/admin/orders">📋 Commandes</a>
    <div class="logout"><a href="/logout">🚪 Déconnexion</a></div>
</aside>

<main class="admin-main">
    <div class="page-topbar">
        <h1>Catégories</h1>
        <a href="/admin/categories/new" class="btn btn-primary">+ Nouvelle catégorie</a>
    </div>

    <div class="table-card">
        <table th:if="${!categories.empty}">
            <thead>
                <tr><th>Catégorie</th><th>Nb produits</th><th>Image</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="category : ${categories}">
                    <td>
                        <div class="item-cell">
                            <div class="item-thumb">
                                <img th:if="${category.imageUrl != null and !category.imageUrl.isEmpty()}"
                                     th:src="${category.imageUrl}" th:alt="${category.nom}"/>
                                <span th:if="${category.imageUrl == null or category.imageUrl.isEmpty()}">🏷</span>
                            </div>
                            <span class="item-name" th:text="${category.nom}">Pâtisseries</span>
                        </div>
                    </td>
                    <td th:text="${category.products != null ? category.products.size() : 0}">0</td>
                    <td>
                        <span th:if="${category.imageUrl != null and !category.imageUrl.isEmpty()}"
                              class="stock-badge ok">✅ Définie</span>
                        <span th:if="${category.imageUrl == null or category.imageUrl.isEmpty()}"
                              class="item-sub">— Aucune</span>
                    </td>
                    <td>
                        <div class="actions">
                            <a class="btn btn-sm btn-secondary" th:href="@{/admin/categories/edit/{id}(id=${category.id})}">✏️ Modifier</a>
                            <a class="btn btn-sm btn-danger" th:href="@{/admin/categories/delete/{id}(id=${category.id})}"
                               onclick="return confirm('Êtes-vous sûr?')">🗑 Supprimer</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${categories.empty}" class="empty-state"><p>Aucune catégorie trouvée.</p></div>
    </div>
</main>
</body>
</html>
