<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Catégorie</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Jost&display=swap" rel="stylesheet"/>
    <style>
        :root { --cream:#F8F3EE; --warm:#FDFAF7; --sand:#ffeed9; --sandD:#D4BFA8; --taupe:#B8A090; --espresso:#5C4033; --gold:#C9A96E; --goldP:#F5EDDC; --ink:#3A3028; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);display:flex}
        .sidebar{width:240px;background:var(--warm);border-right:1px solid var(--sand);padding:2rem 1.2rem;position:fixed;height:100vh}
        .brand{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--espresso);text-decoration:none;margin-bottom:2rem}
        .brand em{color:var(--gold);font-style:italic}
        .sidebar a{display:flex;align-items:center;gap:.7rem;padding:.65rem .9rem;border-radius:10px;color:var(--ink-soft);text-decoration:none;font-size:.9rem}
        .sidebar a:hover{background:rgba(201,169,110,0.15)}
        .main{margin-left:240px;padding:2.5rem}
        .page-header{display:flex;align-items:center;gap:1rem;margin-bottom:2rem}
        .back-btn{width:36px;height:36px;border-radius:10px;background:var(--warm);border:1px solid var(--sand);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--ink)}
        .page-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--espresso)}
        .form-card{background:var(--warm);border:1px solid var(--sand);border-radius:20px;padding:2rem;max-width:500px}
        .form-group{margin-bottom:1.5rem}
        label{display:block;font-size:.8rem;font-weight:600;color:var(--espresso);text-transform:uppercase;margin-bottom:.5rem}
        input{width:100%;padding:.75rem;border:1px solid var(--sandD);border-radius:10px;font-size:.95rem}
        .form-actions{display:flex;gap:1rem;margin-top:2rem}
        .btn-primary{flex:1;padding:.85rem;background:var(--espresso);color:var(--cream);border:none;border-radius:12px;font-weight:600;cursor:pointer}
        .btn-secondary{padding:.85rem;background:var(--cream);border:1px solid var(--sandD);border-radius:12px;text-decoration:none;color:var(--ink)}
    </style>
</head>
<body>
<aside class="sidebar">
    <a class="brand" href="/admin/homeAdmin">Lalla <em>Délices</em></a>
    <a href="/admin/homeAdmin">Dashboard</a>
    <a href="/admin/products">Produits</a>
    <a href="/admin/categories">Catégories</a>
</aside>
<main class="main">
    <div class="page-header">
        <a href="/admin/categories" class="back-btn">←</a>
        <h2 class="page-title" th:text="${category.id != null ? 'Modifier' : 'Nouvelle'}">Formulaire</h2>
    </div>
    <div class="form-card">
        <form th:action="${category.id != null ? '/admin/categories/edit/' + category.id : '/admin/categories'}" th:object="${category}" method="post">
            <div class="form-group">
                <label>Nom</label>
                <input type="text" th:field="*{nom}" required/>
            </div>
            <div class="form-actions">
                <a href="/admin/categories" class="btn-secondary">Annuler</a>
                <button type="submit" class="btn-primary">Enregistrer</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
