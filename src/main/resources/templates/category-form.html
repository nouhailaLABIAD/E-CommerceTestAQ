<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Form Catégorie - Lalla Délices</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/lalla-delices.css}"/>
</head>
<body class="admin-layout">

<aside class="sidebar">
    <a class="brand" href="/admin/homeAdmin">Lalla <em>Délices</em></a>
    <a href="/admin/homeAdmin">🏠 Dashboard</a>
    <a href="/admin/products">📦 Produits</a>
    <a href="/admin/categories" class="active">🏷 Catégories</a>
    <a href="/admin/orders">📋 Commandes</a>
    <div class="logout"><a href="/logout">🚪 Déconnexion</a></div>
</aside>

<main class="admin-main">
    <div class="page-header">
        <a href="/admin/categories" class="back-btn">←</a>
        <h2 th:text="${category.id != null ? 'Modifier la catégorie' : 'Nouvelle catégorie'}">Formulaire</h2>
    </div>

    <div class="form-card" style="max-width:540px;">
        <form th:action="${category.id != null ? '/admin/categories/edit/' + category.id : '/admin/categories'}"
              method="post" enctype="multipart/form-data">

            <input type="hidden" name="existingImageUrl" th:value="${category.imageUrl}"/>

            <div class="form-group" style="margin-bottom:1.5rem;">
                <label for="nom">Nom de la catégorie</label>
                <input type="text" id="nom" name="nom" th:value="${category.nom}"
                       placeholder="Ex : Pâtisseries, Viennoiseries..." required/>
            </div>

            <div class="form-group" style="margin-bottom:1.5rem;">
                <label>Image de la catégorie</label>
                <div class="existing-image" th:if="${category.imageUrl != null and !category.imageUrl.isEmpty()}">
                    <p>Image actuelle :</p>
                    <img th:src="${category.imageUrl}" alt="Image actuelle"/>
                </div>
                <div class="image-upload-zone">
                    <input type="file" name="imageFile" accept="image/jpeg,image/png,image/webp" onchange="previewImage(this)"/>
                    <div class="upload-icon">🖼</div>
                    <div class="upload-text">
                        <strong>Cliquez pour choisir une image</strong><br/>
                        <span th:text="${category.imageUrl != null ? 'ou glissez une image pour remplacer' : 'ou glissez votre fichier ici'}">ou glissez votre fichier ici</span><br/>
                        <small style="color:var(--taupe);font-size:.75rem">JPG, PNG, WebP — max 5 Mo</small>
                    </div>
                </div>
                <div class="image-preview-wrap" id="previewWrap">
                    <p class="preview-label">Nouvelle image :</p>
                    <img id="previewImg" src="#" alt="Prévisualisation"/>
                </div>
            </div>

            <div class="form-actions">
                <a href="/admin/categories" class="btn btn-secondary">Annuler</a>
                <button type="submit" class="btn btn-primary" style="flex:1;">💾 Enregistrer</button>
            </div>
        </form>
    </div>
</main>

<script>
    function previewImage(input) {
        const wrap = document.getElementById('previewWrap');
        const img  = document.getElementById('previewImg');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { img.src = e.target.result; wrap.classList.add('visible'); };
            reader.readAsDataURL(input.files[0]);
        } else { wrap.classList.remove('visible'); }
    }
</script>
</body>
</html>
