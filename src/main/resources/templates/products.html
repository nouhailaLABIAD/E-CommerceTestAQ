<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Catalogue - Lalla Délices</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/lalla-delices.css}"/>
    <!-- Style spécifique à products.html : card avec effet overlay gold -->
    <style>
        .catalogue-card {
            background: var(--warm-white);
            border: 1px solid var(--sand);
            border-radius: var(--radius-lg);
            padding: 1.4rem;
            display: block;
            color: inherit;
            transition: transform .25s, border-color .25s, box-shadow .25s;
            position: relative;
            overflow: hidden;
        }
        .catalogue-card::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--gold-pale), var(--sand));
            opacity: 0;
            transition: opacity .25s;
            pointer-events: none;
        }
        .catalogue-card:hover { transform: translateY(-4px); border-color: var(--gold); box-shadow: 0 12px 40px rgba(92,64,51,0.12); }
        .catalogue-card:hover::before { opacity: 1; }
        .catalogue-card .card-icon {
            width: 48px; height: 48px; border-radius: 12px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; margin-bottom: 1rem; position: relative;
        }
        .catalogue-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem; font-weight: 600;
            color: var(--espresso);
            transition: color .2s; position: relative;
        }
        .catalogue-card .card-title-link { text-decoration: none; color: inherit; display: block; margin-bottom: .4rem; position: relative; }
        .catalogue-card .card-title-link:hover h3 { color: var(--gold); }
        .catalogue-card .price { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 600; color: var(--gold); margin-bottom: 1rem; position: relative; }
        .catalogue-card .price span { font-size: .75rem; color: var(--taupe); font-weight: 400; font-family: 'Jost', sans-serif; }
        .catalogue-card .card-footer { padding-top: .8rem; border-top: 1px solid var(--sand); display: flex; align-items: center; justify-content: space-between; gap: .5rem; position: relative; }

        .catalogue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }
        .catalogue-section-header { display: flex; align-items: center; justify-content: space-between; margin: 2rem 0 1.8rem; }
        .catalogue-section-header h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 600; color: var(--espresso); }
    </style>
</head>
<body>

<!-- ─── NAV ────────────────────────────────────────────────── -->
<nav class="client-nav">
    <a class="brand" href="/">Lalla <em>Délices</em></a>
    <div class="nav-links">
        <a href="/">Accueil</a>
        <a href="/products">Catalogue</a>
        <a href="/cart" class="cart-badge">🛒 Panier</a>
    </div>
</nav>

<!-- ─── HERO ───────────────────────────────────────────────── -->
<div class="hero">
    <h1>Notre Catalogue</h1>
    <p>Découvrez notre sélection de pâtisseries artisanales</p>
    <form action="/products/search" method="get">
        <div class="search-bar">
            <input type="text" name="keyword" placeholder="🔍 Rechercher un produit..."/>
            <button type="submit">Rechercher</button>
        </div>
    </form>
</div>

<!-- ─── GRILLE PRODUITS ────────────────────────────────────── -->
<div class="container" style="padding-top:2rem;">
    <div class="catalogue-section-header">
        <h2>Tous les produits</h2>
        <span class="count-badge">Nouveau</span>
    </div>

    <div class="catalogue-grid">
        <div class="catalogue-card" th:each="p : ${products}">
            <div class="card-icon">🛍</div>
            <a class="card-title-link" th:href="@{/products/{id}(id=${p.id})}">
                <h3 th:text="${p.nom}">Nom Produit</h3>
            </a>
            <div class="price">
                <span th:text="${p.prix}">0.00</span><span> €</span>
            </div>
            <div class="card-footer">
                <a class="voir-detail" th:href="@{/products/{id}(id=${p.id})}">Voir le détail →</a>
                <button class="btn btn-primary btn-sm"
                        th:onclick="|window.location.href='@{/cart/add/{id}(id=${p.id})}'|">
                    🛒 Ajouter
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
