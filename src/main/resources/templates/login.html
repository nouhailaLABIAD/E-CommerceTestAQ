<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion - Lalla Délices</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/lalla-delices.css}"/>
</head>
<body class="auth-page">

    <a class="brand auth-brand" href="/">Lalla <em>Délices</em></a>

    <div class="auth-card">
        <div class="card-header">
            <div class="icon">🔐</div>
            <h2>Connexion</h2>
            <p>Bienvenue ! Connectez-vous à votre compte</p>
        </div>

        <div class="alert alert-error" th:if="${param.error}">
            <span>⚠️</span><span>Email ou mot de passe incorrect. Réessayez.</span>
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            <span>✅</span><span>Vous avez été déconnecté avec succès.</span>
        </div>
        <div class="alert alert-success" th:if="${param.registered}">
            <span>✅</span><span>Compte créé avec succès ! Connectez-vous.</span>
        </div>

        <form th:action="@{/login}" method="post" style="display:flex;flex-direction:column;gap:1.2rem;">
            <div class="form-group">
                <label for="username">Adresse email</label>
                <div class="input-wrap">
                    <span class="input-icon">📧</span>
                    <input type="text" id="username" name="username"
                           placeholder="exemple@email.com" autocomplete="email" required/>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="password" name="password"
                           placeholder="Votre mot de passe" autocomplete="current-password" required/>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:.4rem;">
                Se connecter →
            </button>
        </form>

        <div class="text-divider">ou</div>

        <div class="auth-footer">
            Pas encore de compte ? <a href="/register">Créer un compte</a>
        </div>
    </div>

    <a class="back-link" href="/">← Retour à l'accueil</a>

</body>
</html>
