<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion — ShopLux</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* ── FOND ANIMÉ ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(129,140,248,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(192,132,252,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── BRAND ── */
        .brand {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            margin-bottom: 2rem;
            z-index: 1;
            letter-spacing: -.01em;
        }

        /* ── CARD ── */
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 2.5rem 2.8rem;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(16px);
            box-shadow:
                0 0 0 1px rgba(129,140,248,0.05),
                0 24px 60px rgba(0,0,0,0.4);
        }

        /* ── HEADER CARD ── */
        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .card-header .icon {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1.2rem;
            box-shadow: 0 8px 24px rgba(129,140,248,0.3);
        }
        .card-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: .4rem;
        }
        .card-header p {
            color: #64748b;
            font-size: .88rem;
        }

        /* ── ALERT ERREUR ── */
        .alert-error {
            display: flex;
            align-items: center;
            gap: .6rem;
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.25);
            color: #f87171;
            border-radius: 12px;
            padding: .75rem 1rem;
            font-size: .85rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        /* ── ALERT LOGOUT ── */
        .alert-success {
            display: flex;
            align-items: center;
            gap: .6rem;
            background: rgba(74,222,128,0.08);
            border: 1px solid rgba(74,222,128,0.25);
            color: #4ade80;
            border-radius: 12px;
            padding: .75rem 1rem;
            font-size: .85rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        /* ── FORM ── */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: .45rem;
        }

        label {
            font-size: .8rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrap .input-icon {
            position: absolute;
            left: .95rem;
            font-size: 1rem;
            pointer-events: none;
            opacity: .5;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: .78rem 1rem .78rem 2.6rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }
        input[type="text"]::placeholder,
        input[type="password"]::placeholder { color: #475569; }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: rgba(129,140,248,0.6);
            background: rgba(129,140,248,0.05);
            box-shadow: 0 0 0 3px rgba(129,140,248,0.1);
        }

        /* ── BOUTON ── */
        .btn-login {
            width: 100%;
            padding: .9rem;
            margin-top: .4rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            letter-spacing: .01em;
            box-shadow: 0 4px 20px rgba(129,140,248,0.25);
        }
        .btn-login:hover {
            opacity: .88;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(129,140,248,0.35);
        }
        .btn-login:active { transform: translateY(0); }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin: .5rem 0;
            color: #334155;
            font-size: .78rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }

        /* ── FOOTER ── */
        .card-footer {
            text-align: center;
            margin-top: 1.6rem;
            color: #64748b;
            font-size: .85rem;
        }
        .card-footer a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 600;
            transition: color .2s;
        }
        .card-footer a:hover { color: #c084fc; }

        /* ── BACK LINK ── */
        .back-link {
            z-index: 1;
            margin-top: 1.8rem;
            color: #475569;
            font-size: .83rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .4rem;
            transition: color .2s;
        }
        .back-link:hover { color: #94a3b8; }
    </style>
</head>
<body>

    <!-- BRAND -->
    <a class="brand" href="/">✦ ShopLux</a>

    <!-- CARD -->
    <div class="login-card">

        <!-- HEADER -->
        <div class="card-header">
            <div class="icon">🔐</div>
            <h2>Connexion</h2>
            <p>Bienvenue ! Connectez-vous à votre compte</p>
        </div>

        <!-- ERREUR login Spring Security -->
        <div class="alert-error" th:if="${param.error}">
            <span>⚠️</span>
            <span>Email ou mot de passe incorrect. Réessayez.</span>
        </div>

        <!-- MESSAGE déconnexion -->
        <div class="alert-success" th:if="${param.logout}">
            <span>✅</span>
            <span>Vous avez été déconnecté avec succès.</span>
        </div>

        <!-- FORM -->
        <form th:action="@{/login}" method="post">

            <!-- EMAIL -->
            <div class="form-group">
                <label for="username">Adresse email</label>
                <div class="input-wrap">
                    <span class="input-icon">📧</span>
                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="exemple@email.com"
                           autocomplete="email"
                           required/>
                </div>
            </div>

            <!-- MOT DE PASSE -->
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Votre mot de passe"
                           autocomplete="current-password"
                           required/>
                </div>
            </div>

            <!-- BOUTON -->
            <button type="submit" class="btn-login">
                Se connecter →
            </button>

        </form>

        <div class="divider">ou</div>

        <!-- FOOTER -->
        <div class="card-footer">
            Pas encore de compte ?
            <a href="/register">Créer un compte</a>
        </div>

    </div>

    <!-- RETOUR -->
    <a class="back-link" href="/">← Retour à l'accueil</a>

</body>
</html>
