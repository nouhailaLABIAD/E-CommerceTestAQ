<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion - Lalla Délices</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --cream: #F8F3EE;
            --cream-deep: #F0E8DF;
            --warm-white: #FDFAF7;
            --sand: #ffeed9;
            --sand-dark: #D4BFA8;
            --taupe: #B8A090;
            --mocha: #8C6E5A;
            --espresso: #5C4033;
            --gold: #C9A96E;
            --gold-light: #f8d99a;
            --gold-pale: #F5EDDC;
            --sage: #A8B89C;
            --sage-deep: #849A76;
            --ink: #3A3028;
            --ink-soft: #6B5C52;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* FOND */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(168, 184, 156, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(201, 169, 110, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* BRAND */
        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--espresso);
            text-decoration: none;
            margin-bottom: 2rem;
            z-index: 1;
        }
        .brand em { color: var(--gold); font-style: italic; }

        /* CARD */
        .login-card {
            position: relative;
            z-index: 1;
            background: var(--warm-white);
            border: 1px solid var(--sand);
            border-radius: 24px;
            padding: 2.5rem 2.8rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 60px rgba(92, 64, 51, 0.15);
        }

        /* HEADER CARD */
        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .card-header .icon {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1.2rem;
            box-shadow: 0 8px 24px rgba(201, 169, 110, 0.3);
        }
        .card-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--espresso);
            margin-bottom: .4rem;
        }
        .card-header p {
            color: var(--taupe);
            font-size: .88rem;
        }

        /* ALERT ERREUR */
        .alert-error {
            display: flex;
            align-items: center;
            gap: .6rem;
            background: rgba(220, 53, 69, 0.08);
            border: 1px solid rgba(220, 53, 69, 0.25);
            color: #c2185b;
            border-radius: 12px;
            padding: .75rem 1rem;
            font-size: .85rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        /* ALERT LOGOUT */
        .alert-success {
            display: flex;
            align-items: center;
            gap: .6rem;
            background: rgba(168, 184, 156, 0.2);
            border: 1px solid var(--sage-deep);
            color: var(--sage-deep);
            border-radius: 12px;
            padding: .75rem 1rem;
            font-size: .85rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        /* FORM */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: .45rem;
        }

        label {
            font-size: .8rem;
            font-weight: 600;
            color: var(--espresso);
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrap .input-icon {
            position: absolute;
            left: .95rem;
            font-size: 1rem;
            pointer-events: none;
            opacity: .5;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: .78rem 1rem .78rem 2.6rem;
            background: var(--cream);
            border: 1px solid var(--sand-dark);
            border-radius: 12px;
            color: var(--ink);
            font-family: inherit;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }
        input[type="text"]::placeholder,
        input[type="password"]::placeholder { color: var(--taupe); }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--gold);
            background: var(--warm-white);
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.2);
        }

        /* BOUTON */
        .btn-login {
            width: 100%;
            padding: .9rem;
            margin-top: .4rem;
            background: var(--espresso);
            border: none;
            border-radius: 12px;
            color: var(--cream);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            letter-spacing: .01em;
            box-shadow: 0 4px 20px rgba(92, 64, 51, 0.25);
        }
        .btn-login:hover {
            opacity: .9;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(92, 64, 51, 0.35);
            background: var(--gold);
            color: var(--espresso);
        }
        .btn-login:active { transform: translateY(0); }

        /* DIVIDER */
        .divider {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin: .5rem 0;
            color: var(--taupe);
            font-size: .78rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--sand);
        }

        /* FOOTER */
        .card-footer {
            text-align: center;
            margin-top: 1.6rem;
            color: var(--taupe);
            font-size: .85rem;
        }
        .card-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: color .2s;
        }
        .card-footer a:hover { color: var(--espresso); }

        /* BACK LINK */
        .back-link {
            z-index: 1;
            margin-top: 1.8rem;
            color: var(--taupe);
            font-size: .83rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .4rem;
            transition: color .2s;
        }
        .back-link:hover { color: var(--espresso); }
    </style>
</head>
<body>

    <!-- BRAND -->
    <a class="brand" href="/">Lalla <em>Délices</em></a>

    <!-- CARD -->
    <div class="login-card">

        <!-- HEADER -->
        <div class="card-header">
            <div class="icon">🔐</div>
            <h2>Connexion</h2>
            <p>Bienvenue ! Connectez-vous à votre compte</p>
        </div>

        <!-- ERREUR login Spring Security -->
        <div class="alert-error" th:if="${param.error}">
            <span>⚠️</span>
            <span>Email ou mot de passe incorrect. Réessayez.</span>
        </div>

        <!-- MESSAGE déconnexion -->
        <div class="alert-success" th:if="${param.logout}">
            <span>✅</span>
            <span>Vous avez été déconnecté avec succès.</span>
        </div>

        <!-- FORM -->
        <form th:action="@{/login}" method="post">

            <!-- EMAIL -->
            <div class="form-group">
                <label for="username">Adresse email</label>
                <div class="input-wrap">
                    <span class="input-icon">📧</span>
                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="exemple@email.com"
                           autocomplete="email"
                           required/>
                </div>
            </div>

            <!-- MOT DE PASSE -->
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Votre mot de passe"
                           autocomplete="current-password"
                           required/>
                </div>
            </div>

            <!-- BOUTON -->
            <button type="submit" class="btn-login">
                Se connecter →
            </button>

        </form>

        <div class="divider">ou</div>

        <!-- FOOTER -->
        <div class="card-footer">
            Pas encore de compte ?
            <a href="/register">Créer un compte</a>
        </div>

    </div>

    <!-- RETOUR -->
    <a class="back-link" href="/">← Retour à l'accueil</a>

</body>
</html>
